<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车辆管理系统 - 管理員入口</title>
    <meta name="google" content="notranslate">
    <meta http-equiv="Content-Language" content="zh">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft JhengHei', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 20px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .search-box {
            max-width: 500px;
            margin: 0 auto 40px;
        }
        
        .search-box input {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .search-box input:focus {
            outline: none;
        }
        
        .vehicles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .vehicle-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .vehicle-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .vehicle-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f5f5f5;
        }
        
        .vehicle-info {
            padding: 20px;
        }
        
        .vehicle-number {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .vehicle-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .status-active {
            background: #e8f5e8;
            color: #2ecc71;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #f39c12;
        }
        
        .status-protected {
            background: #e8f4fd;
            color: #3498db;
        }
        
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        
        .action-btn {
            background: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .action-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
        
        .footer {
            text-align: center;
            color: white;
            margin-top: 50px;
            padding: 20px;
            opacity: 0.8;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .vehicles-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .card-header {
            position: relative;
            background: #f8f9fa;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .vehicle-placeholder {
            font-size: 3em;
            color: #ccc;
        }

        .navigation {
            text-align: center;
            margin: 30px 0;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 12px 24px;
            border-radius: 25px;
            text-decoration: none;
            margin: 0 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .nav-btn:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 车辆管理系统</h1>
            <p>管理員专属入口 - 安全验证访问</p>
        </div>

        <div class="navigation">
            <a href="index.html" class="nav-btn">
                <i class="fas fa-home"></i> 返回首頁
            </a>
            <a href="vehicles.html" class="nav-btn">
                <i class="fas fa-car"></i> 車輛列表
            </a>
            <a href="products.html" class="nav-btn">
                <i class="fas fa-shopping-bag"></i> 產品管理
            </a>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索车牌号码..." onkeyup="searchVehicles()">
        </div>
        
        <div class="vehicles-grid" id="vehiclesGrid">
            <!-- 车辆卡片将通过 JavaScript 动态生成 -->
        </div>
        
        <div class="quick-actions">
            <button class="action-btn" onclick="showAllVehicles()">📋 显示所有车辆</button>
            <button class="action-btn" onclick="filterByStatus('active')">✅ 已验证车辆</button>
            <button class="action-btn" onclick="filterByStatus('pending')">⏳ 待验证车辆</button>
            <button class="action-btn" onclick="filterByStatus('protected')">🛡️ 车牌已保护</button>
        </div>
        
        <div class="footer">
            <p>© 2025 Myx Shop | 车辆管理系统</p>
            <p style="margin-top: 10px; font-size: 0.9em;">
                SSM注册: 202510210078 (JM1034075-K)
            </p>
        </div>
    </div>

    <script>
        // 车辆数据 - 使用正确的本地图片路径
        const vehicles = [
            {
                number: "BEU822",
                status: "active",
                image: "images/vehicles/ABC1111/cover.jpg",
                lastAccess: "2024-01-15",
                description: "Daihatsu Feroza SE - 黑色",
                link: "ABC1111.html"
            },
            {
                number: "CBG9761",
                status: "protected", 
                image: "images/vehicles/ABC1234A/cover.jpg",
                lastAccess: "2024-01-10",
                description: "Mitsubishi Storm 4x4 Pickup - 黃色",
                link: "ABC1234A.html"
            },
            {
                number: "MAS8543",
                status: "pending",
                image: "images/vehicles/ABC1234/cover.jpg", 
                lastAccess: "2024-01-12",
                description: "Perodua Kembara - 银色",
                link: "ABC1234.html"
            }
        ];

        // 获取状态显示文本
        function getStatusText(status) {
            const statusMap = {
                'active': '已验证',
                'pending': '待验证', 
                'protected': '车牌已保护'
            };
            return statusMap[status] || status;
        }

        // 获取状态样式类
        function getStatusClass(status) {
            return 'status-' + status;
        }

        // 初始化显示所有车辆
        function renderVehicles(vehiclesToRender = vehicles) {
            const grid = document.getElementById('vehiclesGrid');
            grid.innerHTML = '';
            
            if (vehiclesToRender.length === 0) {
                grid.innerHTML = `
                    <div style="text-align: center; color: white; padding: 40px; grid-column: 1 / -1;">
                        <h3>找不到符合条件的车辆</h3>
                        <p>请尝试其他搜索关键词</p>
                    </div>
                `;
                return;
            }
            
            vehiclesToRender.forEach(vehicle => {
                const card = document.createElement('div');
                card.className = 'vehicle-card';
                card.onclick = () => openVehiclePage(vehicle.link);
                
                card.innerHTML = `
                    <div class="card-header">
                        <img src="${vehicle.image}" alt="${vehicle.number}" class="vehicle-image" 
                             onerror="this.style.display='none'; this.parentNode.innerHTML='<div class=\"vehicle-placeholder\">🚗</div>'">
                    </div>
                    <div class="vehicle-info">
                        <div class="vehicle-status ${getStatusClass(vehicle.status)}">
                            ${getStatusText(vehicle.status)}
                        </div>
                        <div class="vehicle-number">${vehicle.number}</div>
                        <p>${vehicle.description}</p>
                        <div style="margin-top: 10px; color: #666; font-size: 0.9em;">
                            最后访问: ${vehicle.lastAccess}
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // 搜索车辆
        function searchVehicles() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filteredVehicles = vehicles.filter(vehicle => 
                vehicle.number.toLowerCase().includes(searchTerm) ||
                vehicle.description.toLowerCase().includes(searchTerm)
            );
            renderVehicles(filteredVehicles);
        }

        // 按状态筛选
        function filterByStatus(status) {
            const filteredVehicles = vehicles.filter(vehicle => vehicle.status === status);
            renderVehicles(filteredVehicles);
            document.getElementById('searchInput').value = '';
        }

        // 显示所有车辆
        function showAllVehicles() {
            renderVehicles();
            document.getElementById('searchInput').value = '';
        }

        // 打开车辆详情页面
        function openVehiclePage(link) {
            if (link) {
                window.location.href = link;
            }
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderVehicles();
        });
    </script>
</body>
</html>
