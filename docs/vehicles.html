<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二手車輛資訊 - 建設中</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft JhengHei', '微軟正黑體', Arial, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #3498db, #2ecc71, #e74c3c, #f39c12);
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2.5rem;
            font-weight: 700;
        }
        
        .construction-icon {
            font-size: 120px;
            margin: 30px 0;
            color: #f39c12;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .message {
            font-size: 1.5rem;
            color: #7f8c8d;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .buttons-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 180px;
            text-decoration: none;
        }
        
        .btn-home {
            background-color: #3498db;
            color: white;
        }
        
        .btn-stocks {
            background-color: #2ecc71;
            color: white;
        }
        
        .btn-products {
            background-color: #e74c3c;
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .btn-home:hover {
            background-color: #2980b9;
        }
        
        .btn-stocks:hover {
            background-color: #27ae60;
        }
        
        .btn-products:hover {
            background-color: #c0392b;
        }
        
        .footer {
            margin-top: 40px;
            color: #95a5a6;
            font-size: 0.9rem;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .construction-icon {
                font-size: 80px;
            }
            
            .message {
                font-size: 1.2rem;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>二手車輛資訊</h1>
        
        <div class="construction-icon">
            🚧
        </div>
        
        <div class="message">
            很抱歉，網頁正在更新當中<br>
            我們正在努力為您提供更好的服務
        </div>
        
        <div class="buttons-container">
            <a href="index.html" class="btn btn-home">
                回到主頁
            </a>
            <a href="stocks.html" class="btn btn-stocks">
                AI 選股成績
            </a>
            <a href="products.html" class="btn btn-products">
                聯盟商店
            </a>
        </div>
        
        <div class="footer">
            © 2023 二手車輛資訊 - 即將上線
        </div>
    </div>
</body>
</html>
